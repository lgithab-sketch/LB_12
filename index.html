<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Tabs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">

    <div class="tabs__buttons">
        <button class="tab active" data-tab="tab1">Вкладка 1</button>
        <button class="tab" data-tab="tab2">Вкладка 2</button>
        <button class="tab" data-tab="tab3">Вкладка 3</button>
    </div>

    <div class="tabs__content">
        <div class="tab-content active" id="tab1">
            <h2>Контент 1</h2>
            <p>Це перша вкладка.</p>
        </div>

        <div class="tab-content" id="tab2">
            <h2>Контент 2</h2>
            <p>Це друга вкладка.</p>
        </div>

        <div class="tab-content" id="tab3">
            <h2>Контент 3</h2>
            <p>Це третя вкладка.</p>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
